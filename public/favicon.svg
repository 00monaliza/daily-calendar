<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Calendar body -->
  <rect x="6" y="12" width="52" height="46" rx="7" fill="#3E7B7A"/>
  <!-- Calendar top bar -->
  <rect x="6" y="12" width="52" height="16" rx="7" fill="#3E7B7A"/>
  <rect x="6" y="20" width="52" height="8" fill="#3E7B7A"/>
  <!-- Calendar pegs -->
  <rect x="20" y="6" width="5" height="12" rx="2.5" fill="#2D6665"/>
  <rect x="39" y="6" width="5" height="12" rx="2.5" fill="#2D6665"/>
  <!-- White inner area -->
  <rect x="6" y="26" width="52" height="32" rx="0" fill="white" opacity="0.15"/>
  <!-- Key icon (white) -->
  <!-- Key head (circle) -->
  <circle cx="27" cy="38" r="7" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Key shaft -->
  <rect x="32" y="36.5" width="14" height="3" rx="1.5" fill="white"/>
  <!-- Key teeth -->
  <rect x="41" y="39.5" width="3" height="4" rx="1" fill="white"/>
  <rect x="36" y="39.5" width="3" height="3" rx="1" fill="white"/>
  <!-- Key hole -->
  <circle cx="27" cy="38" r="2.5" fill="#3E7B7A"/>
  <!-- Red notification dot -->
  <circle cx="51" cy="47" r="7" fill="#E8607A"/>
</svg>
