<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b6f70" />
    <title>Нет соединения</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 20%, #d8ece9, #e8f3f1 55%, #f4faf9);
        color: #183c3d;
      }
      .card {
        width: min(92vw, 460px);
        padding: 24px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(24, 60, 61, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Вы офлайн</h1>
      <p>
        Подключение к сети отсутствует. Приложение продолжит работать с уже
        кэшированными данными, а эта страница отобразится для недоступных
        маршрутов.
      </p>
    </main>
  </body>
</html>
